name: "Build backend"
inputs:
  version:
    description: "Version"
    required: false
    default: "dev"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: "backend/go.mod"

    - run: CGO_ENABLED=0 go build -ldflags "-X github.com/climblive/platform/backend/internal/handlers/rest.Version=${{ inputs.version }}" -o climblive ./cmd/api
      shell: bash
      working-directory: backend

    - uses: actions/upload-artifact@v4
      with:
        name: backend
        path: backend/climblive
